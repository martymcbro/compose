services:
  backrest:
    image: garethgeorge/backrest:latest
    container_name: backrest
    ports:
      - 9898:9898
    volumes:
      - /pool/docker/backrest/data:/data
      - /pool/docker/backrest/config:/config
      - /pool/docker/backrest/cache:/cache
      - /pool/docker/backrest/ssh:/root/.ssh
      - /pool/docker/backrest/rclone/:/root/.config/rclone
      - /pool/:/userdata # [optional] mount local paths to backup here.
      #- /MY-REPOS:/repos # [optional] mount repos if using local storage, not necessary for remotes e.g. B2, S3, etc.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - BACKREST_DATA=/data # path for backrest data. restic binary and the database are placed here.
      - BACKREST_CONFIG=/config/config.json # path for the backrest config file.
      - XDG_CACHE_HOME=/cache # path for the restic cache which greatly improves performance.
      - TZ=Europe/Berlin # set the timezone for the container, used as the timezone for cron jobs.
    restart: unless-stopped