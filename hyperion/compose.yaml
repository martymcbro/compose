services:
  hyperion:
    image: foorschtbar/hyperion
    container_name: hyperion
    # privileged: true # for PWM
    ports:
      - 8090:8090
      - 8092:8092
      - 19400:19400
      - 19444:19444
      - 19445:19445
    volumes:
      - /pool/docker/hyperion/config/:/root/.hyperion
    #devices:
    # - /dev/video0:/dev/video0
    # - /dev/spidev0.0:/dev/spidev0.0 # for SPI
    restart: unless-stopped

networks:
  lan:
    external: true