services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=Europe/Berlin    # optional: set desired timezone
    user: 1000:100 # optional: replace with your own user/group or uid/gid
    volumes:
      - /pool/docker/ntfy/cache:/var/cache/ntfy
      - /pool/docker/ntfy/config:/etc/ntfy
    networks:
      dmz:
    #ports:
    #  - 80:80
    healthcheck: # optional: remember to adapt the host:port to your environment
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`${HOST}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.routers.ntfy.tls.certresolver=letsencrypt"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
    restart: unless-stopped
    init: true # needed, if healthcheck is used. Prevents zombie processes

networks:
  dmz:
    external: true