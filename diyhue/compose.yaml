services:
  diyhue:
    image: diyhue/core:latest
    container_name: diyhue
    hostname: diyhue
    volumes:
      - /pool/docker/diyhue/config:/opt/hue-emulator/config
    ports:
      - 80/tcp
      - 443/tcp
      - 1900/udp 
      - 2100/udp
      - 1982/udp
    networks:
      lan:
        ipv4_address: 192.168.1.53
    restart: always

networks:
  lan:
    external: true
