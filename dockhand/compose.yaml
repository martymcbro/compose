services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - /pool/docker/timelimit/timelimit-server:/pool/docker/timelimit/timelimit-server
      - /var/run/docker.sock:/var/run/docker.sock
      - /pool/docker/dockhand/data:/app/data
      - /pool/compose:/pool/compose